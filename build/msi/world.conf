# Mochi world server configuration
# After editing, restart the "Mochi World" service from services.msc or:
#   net stop mochi-world && net start mochi-world
# Every key can also be set by environment variable as MOCHI_<SECTION>_<KEY>.
# See the documentation at https://docs.mochi-os.org/ for the full reference.

#[world]
# The server name shown to players in the lobby
#name = My world server

#[transport]
# The public URL advertised to game clients
#address = https://yourdomain:4433

# TLS, in order of precedence:
# 1. [tls] certificate/key files, reloaded automatically when the certificate
#    file changes on disk (both keys may point at one combined PEM file)
# 2. [acme] hosts - built-in Let's Encrypt; port 80 must be reachable for
#    validation, certificates are cached under [acme] cache and renewed
#    automatically
# 3. Neither - an ephemeral self-signed certificate, rotated every few days;
#    game clients pin its hash, which the lobby advertises over plaintext HTTP.
#    This mode is ENCRYPTED BUT UNAUTHENTICATED: with no DNS name or CA
#    certificate a browser cannot verify the server identity, and an on-path
#    attacker on an untrusted network could substitute their own address and
#    hash. It is intended for LAN / no-DNS / development play. Use [tls] or
#    [acme] for any server exposed on a network you do not control - a
#    browser served over HTTPS reaches those modes only (it blocks the
#    plaintext lobby as mixed content), so a public deployment uses them
#    anyway.
#[tls]
#certificate = C:\ProgramData\Mochi\yourdomain.pem
#key = C:\ProgramData\Mochi\yourdomain.pem
#[acme]
#hosts = yourdomain
#cache = C:\ProgramData\Mochi\world
