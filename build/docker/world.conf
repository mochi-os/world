# Mochi world server configuration (Docker image default).
# Every key can also be set by environment variable as MOCHI_<SECTION>_<KEY> -
# the natural way to configure a container, e.g.:
#   docker run -e MOCHI_WORLD_NAME="My world" -e MOCHI_TRANSPORT_ADDRESS=https://yourdomain:4433 \
#     -p 4433:4433/tcp -p 4433:4433/udp ghcr.io/mochi-os/mochi-world
# See mochi-world(8) for the full reference.

# TLS, in order of precedence:
# 1. [tls] certificate/key files (mount them into the container), reloaded
#    automatically when the certificate file changes
# 2. [acme] hosts - built-in Let's Encrypt; publish port 80 for validation
#    and mount a volume at /var/lib/mochi-world to persist the cache
# 3. Neither - an ephemeral self-signed certificate, rotated every few days;
#    game clients pin its hash via the lobby
